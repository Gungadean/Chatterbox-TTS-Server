services:
  chatterbox-tts-server:
    build:
      context: .
      dockerfile: Dockerfile.xpu
    image: chatterbox-tts-server:xpu
    container_name: chatterbox-tts-server-xpu
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - video
      - render
    ports:
      - "8004:8004"
    volumes:
      - ./model_cache:/app/model_cache
      - ./reference_audio:/app/reference_audio
      - ./outputs:/app/outputs
      - ./voices:/app/voices
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
      - ~/.cache/huggingface:/app/hf_cache
    environment:
      - HF_TOKEN=YOUR_TOKEN_HERE
      - SYCL_PI_LEVEL_ZERO_USE_IMMEDIATE_COMMANDLISTS=1
      - ZES_ENABLE_SYSMAN=1
    restart: unless-stopped
